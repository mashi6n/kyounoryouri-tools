name: ci
on:
  pull_request:
    branches:
      - main

jobs:
  changes:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    outputs:
      lint: ${{ steps.filter.outputs.lint }}
      lock: ${{ steps.filter.outputs.lock }}
    steps:
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            lint:
              - src/**/*.py
            lock:
              - uv.lock
              - pyproject.toml

  lint:
    needs: changes
    if: ${{ needs.changes.outputs.lint == 'true'}}
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v3
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - name: install dependencies
        run: uv sync --dev
      - name: lint
        run: make

  lock:
    needs: changes
    if: ${{ needs.changes.outputs.lock == 'true'}}
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v3
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - name: Check lock file is up to date
        run: uv lock --check
  